environments:
  local:
    mode: fixed
    credentials:
      presets:
        - name: local-user
          id: local-user
        - name: admin
          id: admin
    mappings:
      items:
        - id: local-user
          variables:
            auth_token: local-token-for-user
        - id: admin
          variables:
            auth_token: local-token-for-admin
      default:
        variables:
          auth_token: local-token-default

  stg:
    mode: http
    credentials:
      presets:
        - name: qa-user
          id: qa-user
          password: qa-password
    request:
      method: POST
      url: "{{base_url}}/auth"
      headers:
        - key: Content-Type
          value: application/x-www-form-urlencoded
      body:
        type: form
        form:
          - key: id
            value: "{{auth.id}}"
          - key: password
            value: "{{auth.password}}"
          - key: tenant
            value: "{{tenant_id}}"
    response:
      inject:
        - from: $.token
          to: auth_token

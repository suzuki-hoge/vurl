environments:
  local:
    mode: fixed
    credentials:
      source: react_input
      mappings:
        - id: local-user
          password: local-password
          variables:
            auth_token: local-token-for-user
        - id: admin
          password: adminpw
          variables:
            auth_token: local-token-for-admin
      default:
        variables:
          auth_token: local-token-default

  stg:
    mode: http
    request:
      method: POST
      url: "{{base_url}}/auth"
      headers:
        - key: Content-Type
          value: application/x-www-form-urlencoded
      body:
        type: form
        form:
          - key: id
            value: "{{auth.id}}"
          - key: password
            value: "{{auth.password}}"
          - key: tenant
            value: "{{tenant_id}}"
    response:
      inject:
        - from: $.token
          to: auth_token

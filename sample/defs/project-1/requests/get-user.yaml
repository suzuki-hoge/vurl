name: Get User
method: GET
path: /{{api_version}}/users/{{user_id}}

auth: true

request:
  query:
    - key: verbose
      value: "1"
    - key: tenant
      value: "{{tenant_id}}"
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer {{auth_token}}
  body:
    type: json
    text: ""

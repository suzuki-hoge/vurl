name: Create User
method: POST
path: /{{api_version}}/users

auth: true

request:
  query:
    - key: tenant
      value: "{{tenant_id}}"
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer {{auth_token}}
  body:
    type: json
    text: |
      {
        "name": "Alice",
        "email": "alice@example.com"
      }

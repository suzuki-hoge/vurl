name: Search Users
method: POST
path: /{{api_version}}/users/search

auth: false

request:
  query:
    - key: tenant
      value: "{{tenant_id}}"
  headers:
    - key: Content-Type
      value: application/x-www-form-urlencoded
    - key: Accept
      value: application/json
  body:
    type: form
    form:
      - key: keyword
        value: alice
      - key: limit
        value: "20"
